<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>予約変更 | スタッフ募集</title>
<link rel="stylesheet" href="style.css">
<style>* { font-family: 'Zen Kaku Gothic New', sans-serif !important; }</style>
</head>
<body>
<div class="page-wrapper">
  <header class="site-header">
    <div class="logo">Staff Recruitment</div>
    <h1>予約の変更</h1>
  </header>

  <div id="state-loading" style="text-align:center;padding:40px 0;color:var(--text2);">
    <div class="loading-spinner" style="margin:0 auto 12px;"></div>
    <div style="font-size:13px;">予約情報を取得中...</div>
  </div>

  <div id="state-content" style="display:none;">
    <div class="card">
      <div class="card-title">現在のご予約</div>
      <div class="booking-summary" id="currentBooking"></div>
    </div>
    <div class="notice">
      下のボタンを押すと現在のご予約はキャンセルされ、<br>
      新しい日程を選ぶカレンダーへ移動します。
    </div>
    <button class="btn-primary" id="changeBtn" onclick="doChange()">
      予約をキャンセルして別日程を選ぶ
    </button>
    <div style="height:10px;"></div>
    <a href="index.html" class="btn-secondary">変更をやめてトップへ</a>
  </div>

  <div id="state-error" style="display:none;">
    <div class="card" style="text-align:center;padding:32px;">
      <div style="font-size:13px;color:var(--text2);" id="errorMsg">予約情報が見つかりませんでした。</div>
    </div>
    <a href="index.html" class="btn-secondary" style="margin-top:12px;display:block;">トップへ戻る</a>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyp0dxoe4P12l2gg5cH7IYoBSBSPBcgjsJVKjEa6bW5xaoDadD1GRFqeYhavVp5X_Dp/exec';
const params = new URLSearchParams(location.search);
const bookingId = params.get('id');

(async function() {
  if (!bookingId) { showError('URLが正しくありません。'); return; }
  try {
    const res = await fetch(`${GAS_URL}?action=getBooking&id=${encodeURIComponent(bookingId)}`);
    const data = await res.json();
    if (!data.success) { showError(data.message || '予約情報が見つかりませんでした。'); return; }
    const b = data.booking;

    // 日付をパース（文字列 "2026-03-22" 形式）
    const dateStr = typeof b.date === 'string' ? b.date : '';
    const d = dateStr ? new Date(dateStr + 'T00:00:00') : null;
    const days = ['日','月','火','水','木','金','土'];
    const dateLabel = d && !isNaN(d)
      ? `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${days[d.getDay()]}）`
      : dateStr;

    // スロットの型変換（時刻型の場合も対応）
    let slot = b.slot || '';
    if (slot && slot.includes('T')) {
      // ISO形式の場合はHH:mmだけ取り出す
      const m = slot.match(/T(\d{2}:\d{2})/);
      if (m) slot = m[1];
    }

    const rows = [
      ['日時', `${dateLabel} ${slot}`],
      ['お名前', b.name],
      ['希望店舗', b.store || '未選択'],
    ];
    document.getElementById('currentBooking').innerHTML = rows.map(([l,v]) =>
      `<div class="booking-summary-row"><span class="label">${l}</span><span class="value">${v}</span></div>`
    ).join('');
    document.getElementById('state-loading').style.display = 'none';
    document.getElementById('state-content').style.display = 'block';
  } catch(e) {
    showError('通信エラーが発生しました。');
  }
})();

async function doChange() {
  const btn = document.getElementById('changeBtn');
  btn.disabled = true; btn.textContent = '処理中...';
  try {
    await fetch(`${GAS_URL}?action=cancelForChange&id=${encodeURIComponent(bookingId)}`);
  } catch(e) {}
  location.href = 'index.html';
}

function showError(msg) {
  document.getElementById('state-loading').style.display = 'none';
  document.getElementById('errorMsg').textContent = msg;
  document.getElementById('state-error').style.display = 'block';
}
</script>
</body>
</html>
